<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AspidosHOPE | 桜の守護</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

:root {
  --bg: #05050f; --cyan: #00c8ff; --sakura: #ffb7c5; --red: #ff2244; --border: rgba(0,200,255,0.15);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); color: #fff; font-family: 'Share Tech Mono', monospace; overflow: hidden; }

/* 画面上部のバー */
#header { 
  background: rgba(2,4,15,0.95); border-bottom: 1px solid var(--border); 
  padding: 10px 20px; position: fixed; top: 0; width: 100%; z-index: 100;
  display: flex; justify-content: space-between; align-items: center;
}
#header h1 { font-family: 'Orbitron', sans-serif; font-size: 14px; color: var(--cyan); letter-spacing: 2px; }

/* 3D表示エリア */
#canvas-zone { width: 100vw; height: 100vh; background: radial-gradient(circle at center, #001133 0%, #05050f 100%); }

/* 操作パネル */
#ui-panel {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  width: 90%; max-width: 450px; background: rgba(5,5,15,0.9);
  border: 1px solid var(--border); padding: 15px; border-radius: 10px; z-index: 100;
}
.btn-row { display: flex; gap: 10px; margin-top: 10px; }
button { 
  flex: 1; padding: 12px; font-family: 'Orbitron', sans-serif; font-size: 10px;
  background: transparent; border: 1px solid var(--sakura); color: var(--sakura);
  cursor: pointer; transition: 0.3s; border-radius: 5px;
}
button:hover { background: rgba(255,183,197,0.2); transform: scale(1.05); }
button.atk { border-color: var(--red); color: var(--red); }

/* ステータス表示 */
.status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.stat-item { font-size: 10px; color: var(--cyan); }
.stat-val { font-size: 16px; font-weight: bold; color: #fff; }

.gate-msg { 
  text-align: center; padding: 10px; border: 1px solid var(--cyan); 
  margin-top: 10px; font-family: 'Orbitron', sans-serif; font-size: 12px;
}
</style>
</head>
<body>

<div id="header">
  <h1>ASPIDOSHOPE <span style="font-size:10px;">- SAKURA-SYNC -</span></h1>
  <div id="tau-display" style="color:var(--sakura); font-size:12px;">τ-Phase: 0.00</div>
</div>

<div id="canvas-zone">
  <canvas id="main-canvas"></canvas>
</div>

<div id="ui-panel">
  <div class="status-grid">
    <div class="stat-item">MAGNITUDE (脅威度)<br><span class="stat-val" id="v-mag">0.00</span></div>
    <div class="stat-item">OMEGA (誠実性)<br><span class="stat-val" id="v-omg">1.00</span></div>
  </div>
  
  <div class="gate-msg" id="gate">GATE OPEN: Stable</div>

  <div class="btn-row">
    <button onclick="fireAttack()">🌸 桜吹雪の舞 (通常)</button>
    <button class="atk" onclick="fireSpike()">☠ 外部干渉 (攻撃)</button>
  </div>
</div>

<script>
// --- 基本設定 ---
let mag = 0;
let omega = 1.0;
let tau = 0;

// --- 3Dの世界を作る ---
const canvas = document.getElementById('main-canvas');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);

// 光の演出
scene.add(new THREE.AmbientLight(0x404040, 2));
const light = new THREE.PointLight(0xffffff, 1.5);
light.position.set(5, 5, 5);
scene.add(light);

// 中央のコア
const coreGeom = new THREE.IcosahedronGeometry(1, 2);
const coreMat = new THREE.MeshPhongMaterial({ color: 0x00c8ff, wireframe: true, transparent: true, opacity: 0.5 });
const core = new THREE.Mesh(coreGeom, coreMat);
scene.add(core);

// 🌸 桜の花びらの生成 🌸
const sakuraGroup = new THREE.Group();
scene.add(sakuraGroup);

const petals = [];
const petalShape = new THREE.Shape();
petalShape.moveTo(0, 0);
petalShape.bezierCurveTo(0.1, 0.1, 0.2, 0, 0, -0.2);
petalShape.bezierCurveTo(-0.2, 0, -0.1, 0.1, 0, 0);
const petalGeom = new THREE.ShapeGeometry(petalShape);

// 3つの群れ（n=3の収束）を作る
for (let i = 0; i < 3; i++) {
  const cluster = new THREE.Group();
  sakuraGroup.add(cluster);
  
  for (let j = 0; j < 30; j++) {
    const pMat = new THREE.MeshPhongMaterial({ 
      color: 0xffb7c5, side: THREE.DoubleSide, transparent: true, opacity: 0.8 
    });
    const petal = new THREE.Mesh(petalGeom, pMat);
    
    // バラバラに配置
    petal.position.set((Math.random()-0.5)*0.5, (Math.random()-0.5)*0.5, (Math.random()-0.5)*0.5);
    petal.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
    
    cluster.add(petal);
    petals.push({ mesh: petal, parent: cluster, phase: (i/3)*Math.PI*2, offset: Math.random()*10 });
  }
}

// ボタンを押した時の動き
function fireAttack() {
  mag = 0.1 + Math.random() * 0.2;
  updateUI("GATE OPEN: Stable", "#00ff88");
}

function fireSpike() {
  mag = 0.7 + Math.random() * 0.4;
  omega -= 0.05; if(omega < 0) omega = 0;
  updateUI("SIGNATURE REQUIRED!", "#ff2244");
  setTimeout(() => { mag = 0.1; updateUI("GATE OPEN: Stable", "#00c8ff"); }, 2000);
}

function updateUI(msg, color) {
  document.getElementById('gate').textContent = msg;
  document.getElementById('gate').style.borderColor = color;
  document.getElementById('gate').style.color = color;
}

// 毎フレームの更新（アニメーション）
function animate() {
  requestAnimationFrame(animate);
  const time = Date.now() * 0.001;
  tau = (time * 0.5) % (Math.PI * 2);

  // コアの回転
  core.rotation.y += 0.01;
  core.rotation.x += 0.005;

  // 桜の舞い（Tau巡回）
  petals.forEach((p, i) => {
    const angle = time * 0.6 + p.phase;
    p.parent.position.x = Math.cos(angle) * 2;
    p.parent.position.z = Math.sin(angle) * 2;
    p.parent.position.y = Math.sin(angle * 1.5) * 0.5;

    p.mesh.rotation.x += 0.02;
    p.mesh.rotation.y += 0.01;

    // 攻撃を受けた時、赤く染まる
    if (mag > 0.6) {
      p.mesh.material.color.setHex(0xff2244);
      p.mesh.scale.setScalar(1.5);
    } else {
      p.mesh.material.color.setHex(0xffb7c5);
      p.mesh.scale.setScalar(1.0);
    }
  });

  // UIの数字を更新
  document.getElementById('v-mag').textContent = mag.toFixed(2);
  document.getElementById('v-omg').textContent = omega.toFixed(2);
  document.getElementById('tau-display').textContent = `τ-Phase: ${tau.toFixed(2)}`;

  renderer.render(scene, camera);
}

// 画面サイズが変わった時の調整
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
