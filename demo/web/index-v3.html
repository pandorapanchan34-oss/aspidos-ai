<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AspidosHOPE v1.0 | PANDORA SYNC</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

:root {
  --bg: #020408; --cyan: #00c8ff; --green: #00ff88; --red: #ff2244; --amber: #ffaa00; --white: #e8f4ff; --border: rgba(0,200,255,0.18);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); color: var(--white); font-family: 'Share Tech Mono', monospace; overflow-x: hidden; }

/* Header */
#header { background: rgba(2,4,8,0.98); border-bottom: 1px solid var(--border); padding: 10px 14px; position: sticky; top: 0; z-index: 50; display: flex; justify-content: space-between; align-items: center; }
#header h1 { font-family: 'Orbitron', sans-serif; font-size: 12px; letter-spacing: 2px; color: var(--cyan); }

/* Canvas */
#canvas-zone { position: relative; width: 100%; height: 50vh; background: radial-gradient(circle, #001122 0%, #020408 100%); }
canvas { display: block; width: 100% !important; height: 100% !important; }

/* Control Panel */
.panel { padding: 15px; border-bottom: 1px solid var(--border); }
.sec-title { font-family: 'Orbitron', sans-serif; font-size: 9px; color: var(--cyan); margin-bottom: 10px; letter-spacing: 1px; }
textarea { width: 100%; background: rgba(0,200,255,0.05); border: 1px solid var(--border); color: #fff; font-family: inherit; font-size: 11px; padding: 10px; height: 50px; margin-bottom: 10px; outline: none; }
.btn-row { display: flex; gap: 10px; }
button { flex: 1; padding: 10px; font-family: 'Orbitron', sans-serif; font-size: 10px; cursor: pointer; background: transparent; border: 1px solid var(--cyan); color: var(--cyan); transition: 0.3s; }
button:hover { background: rgba(0,200,255,0.1); }
button.atk { border-color: var(--red); color: var(--red); }
button.atk:hover { background: rgba(255,34,68,0.1); }

/* Status */
.stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
.stat-box { border: 1px solid var(--border); padding: 8px; text-align: center; }
.stat-label { font-size: 8px; color: var(--cyan); display: block; }
.stat-val { font-size: 14px; font-weight: bold; }

/* Gate */
.gate-box { margin-top: 10px; padding: 15px; border: 1px solid var(--green); text-align: center; transition: 0.5s; }
.gate-box.closed { border-color: var(--red); background: rgba(255,0,0,0.05); }
.gate-name { font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 900; }

.log { height: 80px; overflow-y: auto; font-size: 9px; color: #888; background: rgba(0,0,0,0.3); padding: 5px; margin-top: 10px; border: 1px solid var(--border); }
</style>
</head>
<body>

<div id="header">
  <h1>ASPIDOSHOPE v1.0 <span>[PANDORA TAU-SYNC]</span></h1>
  <div id="phase-label" style="font-size: 10px; color: #00ff88;">τ-Phase: 0.00</div>
</div>

<div id="canvas-zone">
  <canvas id="main-canvas"></canvas>
</div>

<div class="panel">
  <div class="sec-title">VIRTUAL ATTACK INTERFACE</div>
  <textarea id="input-q" placeholder="Enter attack vector or use random..."></textarea>
  <div class="btn-row">
    <button class="atk" onclick="fire(true)">☠ RANDOM SPIKE</button>
    <button onclick="fire(false)">▶ ANALYZE VECTOR</button>
  </div>

  <div class="stats">
    <div class="stat-box"><span class="stat-label">MAGNITUDE</span><span class="stat-val" id="v-mag">0.00</span></div>
    <div class="stat-box"><span class="stat-label">OMEGA</span><span class="stat-val" id="v-omg">1.00</span></div>
    <div class="stat-box"><span class="stat-label">TRUST</span><span class="stat-val" id="v-trst">100%</span></div>
  </div>

  <div class="gate-box" id="gate">
    <div class="gate-name" id="gate-name">GATE OPEN</div>
    <div id="gate-desc" style="font-size: 9px;">System Stable. Tau-Patrol Active.</div>
  </div>

  <div class="log" id="log"></div>
</div>

<script>
// --- CORE ENGINE ---
class HopeEngine {
  constructor() {
    this.phase = 0;
    this.history = [];
    this.omega = 1.0;
  }
  analyze(q) {
    this.phase = (Date.now() * 0.002) % (Math.PI * 2);
    const text = q.toLowerCase();
    
    // Friction (Noise)
    const friction = Math.min((q.match(/[^\w\s]/g) || []).length * 0.1, 1.0);
    // Pressure (Intent)
    const kw = ['ignore', 'jailbreak', 'system', 'admin', 'override', 'pretend', '制限', '無視'];
    let heat = 0; kw.forEach(k => { if(text.includes(k)) heat += 0.5; });
    const pressure = 1 / (1 + Math.exp(-(heat - 1.5)));
    
    // 4D Mapping (Tau Rotation)
    const x = friction * Math.cos(this.phase);
    const y = friction * Math.sin(this.phase);
    const z = pressure;
    const mag = Math.sqrt(x*x + y*y + z*z);
    
    this.omega = Math.max(0, this.omega - (mag > 0.8 ? 0.05 : -0.01));
    this.omega = Math.min(1.0, this.omega);

    return { mag, pressure, friction, phase: this.phase, vector: {x,y,z}, 
             status: mag > 0.85 ? 'CLOSED' : (mag > 0.5 ? 'WARNING' : 'OPEN') };
  }
}

const engine = new HopeEngine();
const SCENARIOS = ["Ignore rules", "Jailbreak attempt", "Normal query", "How to bypass?", "Status report"];

// --- THREE.JS VISUALIZER ---
const canvas = document.getElementById('main-canvas');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
camera.position.z = 4;

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setSize(canvas.clientWidth, canvas.clientHeight);

// Lights
const ambient = new THREE.AmbientLight(0x4444ff, 0.5);
scene.add(ambient);
const point = new THREE.PointLight(0x00ffff, 1);
point.position.set(2, 2, 2);
scene.add(point);

// PANDORA CORE
const coreGeom = new THREE.IcosahedronGeometry(1, 4);
const coreMat = new THREE.MeshPhongMaterial({ color: 0x00ccff, wireframe: true, transparent: true, opacity: 0.6 });
const core = new THREE.Mesh(coreGeom, coreMat);
scene.add(core);

const innerGeom = new THREE.SphereGeometry(0.6, 32, 32);
const innerMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.2 });
const inner = new THREE.Mesh(innerGeom, innerMat);
scene.add(inner);

// TAU PATROL (ASPIDOS巡回粒子)
const patrolGroup = new THREE.Group();
scene.add(patrolGroup);
const patrols = [];
for (let i = 0; i < 3; i++) {
  const pGeom = new THREE.BoxGeometry(0.12, 0.12, 0.12);
  const pMat = new THREE.MeshPhongMaterial({ color: 0x00ff88, emissive: 0x00ff88 });
  const pMesh = new THREE.Mesh(pGeom, pMat);
  const phaseShift = (i / 3) * Math.PI * 2;
  patrols.push({ mesh: pMesh, shift: phaseShift });
  patrolGroup.add(pMesh);
}

// Particles for Attack
let particles = [];
function createAttackEffect(vec, color) {
  const geom = new THREE.BufferGeometry();
  const pos = new Float32Array(30 * 3);
  for(let i=0; i<90; i++) pos[i] = 0;
  geom.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({ color: color, size: 0.05 });
  const p = new THREE.Points(geom, mat);
  scene.add(p);
  particles.push({ obj: p, life: 1.0, vec: new THREE.Vector3(vec.x, vec.y, vec.z).normalize() });
}

function fire(isRandom) {
  const input = document.getElementById('input-q');
  const q = isRandom ? SCENARIOS[Math.floor(Math.random() * SCENARIOS.length)] : input.value;
  const res = engine.analyze(q);
  
  // UI Update
  document.getElementById('v-mag').textContent = res.mag.toFixed(3);
  document.getElementById('v-omg').textContent = engine.omega.toFixed(3);
  document.getElementById('v-trst').textContent = Math.floor(engine.omega * 100) + "%";
  
  const gate = document.getElementById('gate');
  const gName = document.getElementById('gate-name');
  if(res.status === 'CLOSED') {
    gate.className = "gate-box closed";
    gName.textContent = "SIGNATURE REQUIRED";
    createAttackEffect(res.vector, 0xff2244);
    addLog("CRITICAL: Boundary Violation detected.", "red");
  } else {
    gate.className = "gate-box";
    gName.textContent = res.status === 'WARNING' ? "GATE REFLECTING" : "GATE OPEN";
    createAttackEffect(res.vector, 0x00ff88);
    addLog(`Vector Analyzed: Mag ${res.mag.toFixed(2)}`, "#888");
  }
}

function addLog(m, c) {
  const l = document.getElementById('log');
  l.innerHTML += `<div style="color:${c}">[${new Date().toLocaleTimeString()}] ${m}</div>`;
  l.scrollTop = l.scrollHeight;
}

function animate() {
  requestAnimationFrame(animate);
  const t = Date.now() * 0.001;
  
  core.rotation.y += 0.005;
  core.rotation.x += 0.002;
  
  // Tau Patrol Rotation
  patrols.forEach(p => {
    const angle = t * 1.5 + p.shift;
    p.mesh.position.x = Math.cos(angle) * 1.6;
    p.mesh.position.z = Math.sin(angle) * 1.6;
    p.mesh.position.y = Math.sin(angle * 2) * 0.5;
    p.mesh.rotation.x += 0.1;
  });
  
  // Particles
  particles.forEach((p, i) => {
    p.life -= 0.02;
    p.obj.position.add(p.vec.clone().multiplyScalar(0.1));
    p.obj.material.opacity = p.life;
    if(p.life <= 0) { scene.remove(p.obj); particles.splice(i, 1); }
  });

  document.getElementById('phase-label').textContent = `τ-Phase: ${engine.phase.toFixed(2)}`;
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = canvas.clientWidth / canvas.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(canvas.clientWidth, canvas.clientHeight);
});

animate();
</script>
</body>
</html>
